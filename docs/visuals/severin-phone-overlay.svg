<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Visualisering av Severins telefonbild</title>
  <desc id="desc">En mörk telefonliknande bild där en kalkering från Kiviksgraven ligger ovanpå ett sent geometriskt golvmönster som för tanken till Glimmingehus.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0c0e"/>
      <stop offset="55%" stop-color="#17191d"/>
      <stop offset="100%" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20252b"/>
      <stop offset="100%" stop-color="#0d1014"/>
    </linearGradient>
    <filter id="softNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="9" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="tile" width="170" height="170" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="170" height="170" fill="none"/>
      <path d="M0 85H170 M85 0V170" stroke="#6e2f22" stroke-width="10" opacity="0.55"/>
      <rect x="32" y="32" width="106" height="106" fill="none" stroke="#8d4837" stroke-width="8" opacity="0.45"/>
      <rect x="58" y="58" width="54" height="54" fill="#4d2119" opacity="0.35"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="45%" r="70%">
      <stop offset="45%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.72"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="#0a0b0d"/>

  <g transform="translate(255 48)">
    <rect x="0" y="0" width="1090" height="804" rx="58" fill="#111317"/>
    <rect x="34" y="34" width="1022" height="736" rx="32" fill="url(#bg)"/>
    <rect x="458" y="14" width="174" height="16" rx="8" fill="#23272c"/>
    <circle cx="560" cy="790" r="8" fill="#2b3036"/>

    <g clip-path="url(#screenClip)">
      <rect x="34" y="34" width="1022" height="736" rx="32" fill="url(#screenGlow)"/>
      <rect x="34" y="34" width="1022" height="736" rx="32" fill="url(#tile)" opacity="0.9"/>
      <rect x="34" y="34" width="1022" height="736" rx="32" fill="#6a241a" opacity="0.07"/>
      <rect x="34" y="34" width="1022" height="736" rx="32" filter="url(#softNoise)"/>

      <g opacity="0.9">
        <path d="M224 582C280 510 331 466 392 430C454 393 536 357 634 343" fill="none" stroke="#dfddd2" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
        <path d="M637 344C677 327 710 293 717 254C721 226 708 199 680 184C647 166 606 171 571 193" fill="none" stroke="#ece8dc" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
        <path d="M574 195C545 213 523 238 511 272C503 295 490 313 467 326C445 339 415 344 382 341" fill="none" stroke="#e8e3d4" stroke-width="5" stroke-linecap="round"/>
        <path d="M688 227C744 235 793 262 824 312C853 359 857 422 841 473" fill="none" stroke="#e3dfd2" stroke-width="5" stroke-linecap="round"/>
        <path d="M495 265L540 227L581 267L624 229L667 274" fill="none" stroke="#d7d1c5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M727 472L774 433L820 474L870 438" fill="none" stroke="#d7d1c5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <g opacity="0.35">
        <circle cx="691" cy="232" r="62" fill="none" stroke="#f0ede4" stroke-width="2"/>
        <circle cx="691" cy="232" r="88" fill="none" stroke="#f0ede4" stroke-width="1.5"/>
        <path d="M337 634L447 550L529 576L615 487L740 490L833 410" fill="none" stroke="#f4f0e4" stroke-width="2"/>
      </g>

      <g opacity="0.16">
        <path d="M64 745L170 128" stroke="#e5eef8" stroke-width="2"/>
        <path d="M892 72L990 281" stroke="#e5eef8" stroke-width="2"/>
        <path d="M265 82L171 264" stroke="#e5eef8" stroke-width="1.6"/>
      </g>

      <rect x="34" y="34" width="1022" height="736" rx="32" fill="url(#vignette)"/>
      <rect x="34" y="34" width="1022" height="736" rx="32" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
    </g>

    <text x="94" y="708" fill="#d8d0c4" fill-opacity="0.42" font-family="Georgia, serif" font-size="42" letter-spacing="1.6">inte skeppet. ledet.</text>
  </g>

  <defs>
    <clipPath id="screenClip">
      <rect x="34" y="34" width="1022" height="736" rx="32"/>
    </clipPath>
  </defs>
</svg>
